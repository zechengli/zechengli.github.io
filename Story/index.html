<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stories | Zecheng Li</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <script src="../lang.js" defer></script>
</head>
<body>
  <nav class="navbar">
    <ul class="nav-list">
      <li><a class="nav-link" href="/Home/" data-en="Home" data-zh="主页">Home</a></li>
      <li><a class="nav-link" href="/Philosophy/" data-en="Philosophy" data-zh="哲学">Philosophy</a></li>
      <li><a class="nav-link" href="/Education/" data-en="Education" data-zh="教育">Education</a></li>
      <li><a class="nav-link" href="/Research/" data-en="Research" data-zh="研究">Research</a></li>
      <li><a class="nav-link" href="/Work/" data-en="Work" data-zh="工作">Work</a></li>
      <li><a class="nav-link" href="/Sports/" data-en="Sports" data-zh="运动">Sports</a></li>
      <li><a class="nav-link" href="/Others/" data-en="Others" data-zh="其他">Others</a></li>
      <li><a class="nav-link active" href="/Story/" data-en="Story" data-zh="故事">Story</a></li>
      <li><button class="lang-toggle" type="button" data-lang-toggle>中文</button></li>
    </ul>
  </nav>

  <main class="page">
    <section class="card content" id="story-list-view">
      <h2 data-en="Stories" data-zh="故事">Stories</h2>
      
      <!-- Story Card as collapsible section -->
      <div class="philosophy-section">
        <button class="section-toggle" data-toggle="my-story">
          <span data-en="📌 My Story" data-zh="📌 我的故事">📌 My Story</span>
          <i class="fas fa-chevron-down"></i>
        </button>
        <div class="section-content" id="my-story">
          <p class="story-meta" data-en="Dec 2025 · PhD Journey" data-zh="2025 年 12 月 · 博士之路">Dec 2025 · PhD Journey</p>
          <div id="story-content" data-en="Loading story..." data-zh="正在加载故事…">Loading story...</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    // Toggle functionality for collapsible sections
    document.querySelectorAll('.section-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.toggle;
        const content = document.getElementById(target);
        const icon = btn.querySelector('i');
        
        content.classList.toggle('expanded');
        icon.classList.toggle('fa-chevron-down');
        icon.classList.toggle('fa-chevron-up');
        
        // Load story content when expanded
        if (content.classList.contains('expanded') && target === 'my-story') {
          loadStoryContent();
        }
      });
    });

    // Load story content
    async function loadStoryContent() {
      const storyContentEl = document.getElementById('story-content');
      const currentLang = window.getLang ? window.getLang() : 'en';
      
      try {
        const response = await fetch('Purdue.html');
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        const htmlContent = await response.text();
        storyContentEl.innerHTML = htmlContent;
        if (window.applyLang) {
          window.applyLang(currentLang);
        }
      } catch (error) {
        console.error('Failed to load story content:', error);
        storyContentEl.innerHTML = (currentLang === 'zh' ? '加载失败，请检查文件是否存在。' : 'Oops! Failed to load the story.');
      }
    }
  </script>
</body>
</html>
